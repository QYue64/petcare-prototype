<!DOCTYPE html>

        .provider-stats { font-size: 12px; color: #999; }
        .provider-rating { color: #F39C12; }

        .provider-distance { font-size: 13px; color: #666; }

        .provider-tags { display: flex; gap: 8px; margin-bottom: 12px; }

        .btn { padding: 12px 24px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; }
        .btn-primary { background: #4A90D9; color: white; }
        .btn-outline { background: white; color: #4A90D9; border: 1px solid #4A90D9; }
        .btn-danger { background: #E74C3C; color: white; }
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #333; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }

        .fixed-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px 16px; border-top: 1px solid #eee; display: flex; gap: 12px; }

        .timeline-content { flex: 1; }
        .timeline-title { font-size: 14px; color: #333; margin-bottom: 4px; }

    </style>
</head>
<body>

v class="provider-info"><div class="provider-name">李四</div><div class="provider-stats"><span class="provider-rating">⭐4.8</span>·80 单</div></div></div><div class="provider-details"><span class="provider-distance">📍3.1km</span><span class="provider-price">¥30/次</span></div><div class="provider-tags"><span class="tag">擅长:喂猫</span></div><button class="btn btn-primary" onclick="event.stopPropagation();showPage('order-confirm')">立即预约</button></div></div><div class="tab-bar"><div class="tab-item active"><div class="tab-icon"></div><span>首页</span></div><div class="tab-item"><div class="tab-icon"></div><span>订单</span></div><div class="tab-item" onclick="showPage('profile')"><div class="tab-icon"></div><span>我的</span></div></div>`,providerList:`<div class="status-bar"><span>中国移动</span><span>13:08</span><span>🔋100%</span></div><div class="nav-bar"><span class="nav-back" onclick="showPage('home')">←</span><span>服务者列表</span></div><div class="content" style="padding-top:0"><div style="padding:12px 16px;background:white"><div class="search-input" style="width:100%">🔍搜索服务者名称/技能</div></div><div style="display:flex;gap:8px;padding:12px 16px;background:white;overflow-x:auto"><span class="tag">类型▼</span><span class="tag">距离▼</span><span class="tag">评分▼</span><span class="tag">价格▼</span></div><div class="provider-card" onclick="showPage('provider-detail')"><div class="provider-header"><div class="provider-avatar">👤</div><div class="provider-info"><div class="provider-name">张三</div><div class="provider-stats"><span class="provider-rating">⭐4.9</span>·100 单</div></div></div><div class="provider-details"><span class="provider-distance">📍2.5km</span><span class="provider-price">¥25/次</span></div><div class="provider-tags"><span class="tag">身份证✓</span><span class="tag">技能✓</span></div><button class="btn btn-primary" onclick="event.stopPropagation();showPage('order-confirm')">立即预约</button></div><div class="provider-card" onclick="showPage('provider-detail')"><div class="provider-header"><div 16px;font-weight:600"><span>合计</span><span style="color:#E74C3C">¥31.75</span></div></div></div><div class="fixed-bottom"><button class="btn btn-primary" style="flex:1" onclick="showToast('提交订单成功')">提交订单支付¥31.75</button></div>`,orderDetail:`<div class="status-bar"><span>中国移动</span><span>13:08</span><span>🔋100%</span></div><div class="nav-bar"><span class="nav-back" onclick="showPage('home')">←</span><span>订单详情</span></div><div class="content"><div class="card" style="text-align:center;padding:30px 16px"><div style="font-size:24px;font-weight:600;color:#F39C12;margin-bottom:8px">待确认</div><div style="color:#999;font-size:14px">等待服务者确认订单</div></div><div class="card"><div style="display:flex;align-items:center;gap:12px"><div class="provider-avatar">👤</div><div style="flex:1"><div style="font-weight:600">张三</div><div style="font-size:12px;color:#999">⭐4.9</div></div><button class="btn btn-outline" style="font-size:12px;padding:6px 12px" onclick="showToast('拨打电话')">联系</button></div></div><div class="card"><div class="card-title">订单信息</div><div class="list-item"><span style="color:#999">订单号</span><span>20260401123456</span></div><div class="list-item"><span style="color:#999">服务类型</span><span>喂猫</span></div><div class="list-item"><span style="color:#999">服务时间</span><span>2026-04-05 09:00-09:30</span></div></div><div class="card"><div class="card-title">订单进度</div><div class="timeline"><div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-content"><div class="timeline-title">订单提交</div><div class="timeline-time">12:30</div></div></div><div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-content"><div class="timeline-title">服务者确认</div><div class="timeline-time">等待确认</div></div></div><div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-content"><div class="timeline-title">服务开始</div><div class="timeline-time">-</div></div></div><div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-content"><div class="timeline-title">服务完成</div><div class="timeline-time">-</div></div></div></div></div></div><div class="fixed-bottom"><button class="btn btn-danger" style="flex:1" onclick="showToast('取消订单')">取消订单</button><button class="btn btn-primary" style="flex:1" onclick="showToast('申请退款')">申请退款</button></div>`,profile:`<div class="status-bar"><span>中国移动</span><span>13:08</span><span>🔋100%</span></div><div class="nav-bar"><span style="flex:1;text-align:center">个人中心</span><span style="margin-left:auto" onclick="showToast('设置')">⚙️</span></div><div class="content"><div class="card" style="display:flex;align-items:center;gap:16px"><div class="provider-avatar" style="width:64px;height:64px;font-size:28px">👤</div><div style="flex:1"><div style="font-size:18px;font-weight:600;margin-bottom:4px">张先生</div><div style="color:#999;font-size:14px">138****1234</div></div><span style="color:#999">></span></div><div class="card"><div class="card-title">我的订单</div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:16px;text-align:center"><div><div style="width:48px;height:48px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:12px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;color:white;font-size:20px">💰</div><div style="font-size:12px">待支付</div><div style="font-size:12px;color:#999">1</div></div><div><div style="width:48px;height:48px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:12px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;color:white;font-size:20px">📋</div><div style="font-size:12px">待确认</div><div style="font-size:12px;color:#999">2</div></div><div><div style="width:48px;height:48px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:12px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;color:white;font-size:20px">🔧</div><div style="font-size:12px">服务中</div><div style="font-size:12px;color:#999">1</         function showPage(p){document.getElementById('screen').innerHTML=pages[p]||'<div style="padding:40px;text-align:center">页面开发中...</div>';document.querySelectorAll('.page-btn').forEach(b=>b.classList.remove('active'));const a=document.querySelector(`.page-btn[onclick="showPage('${p}')"]`);if(a)a.classList.add('active');}

</body>
